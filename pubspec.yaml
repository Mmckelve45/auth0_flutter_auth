name: auth0_flutter_auth
description: Auth0 SDK for Flutter — pure Dart HTTP with minimal native bridges for secure browser and DPoP.
version: 0.1.0
homepage: https://auth0.com
repository: https://github.com/nicosabena/auth0-flutter/tree/main/auth0_flutter_auth

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.0
  crypto: ^3.0.3
  pointycastle: ^3.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  local_auth_platform_interface: ^1.0.0
  otp: ^3.1.4

flutter:
  plugin:
    platforms:
      android:
        package: com.auth0.flutter_auth
        pluginClass: Auth0FlutterAuthPlugin
      ios:
        pluginClass: Auth0FlutterAuthPlugin
      macos:
        pluginClass: Auth0FlutterAuthPlugin
