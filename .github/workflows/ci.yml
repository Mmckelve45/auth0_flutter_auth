name: CI

on:
  push:
    branches: [main, development]
  pull_request_target:
    branches: [main, development]
    types: [labeled]

jobs:
  analyze:
    name: Analyze
    # For PRs, only run if a maintainer added the 'safe-to-test' label.
    # Push events (from contributors with write access) always run.
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter pub get -C example
      - run: flutter pub get -C example_web
      - name: Create placeholder .env for example app
        run: touch example/.env
      - run: flutter analyze --no-fatal-infos

  test:
    name: Unit Tests
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  test-macos:
    name: Unit Tests (macOS)
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
